name = "skyxing"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV命名空间绑定
[[kv_namespaces]]
binding = "SkyXing"
id = "73f13dd572bc4ee58dc6946933568b9e"

# 静态资源目录
[assets]
directory = "public"

# 环境变量
[vars]
ENABLE_AUTH = "true"
TOKEN_SECRET = "skyxing-auth-secret-prod"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true

# Cron: 每日凌晨3点系统维护
[triggers]
crons = ["0 3 * * *"]
