<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyXing - 用户中心</title>
<style>
::root{--p:#667eea;--s:#764ba2;--g:#43e97b;--r:#ff6b6b;--y:#feca57;--bg:#0f172a;--bg2:#1e293b;--bd:rgba(255,255,255,.08);--tx:rgba(255,255,255,.92);--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:#0a0f1a;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 1.5rem;z-index:100}
.topbar .logo{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex:1}
.topbar a{color:var(--t2);text-decoration:none;font-size:.82rem;margin-left:1rem;transition:color .15s}
.topbar a:hover{color:var(--tx)}
.topbar .user-info{color:var(--p);margin-left:1rem;font-size:.82rem;font-weight:500}
.content{max-width:480px;margin:76px auto 0;padding:0 1rem 3rem}
.tabs{display:flex;gap:1px;margin-bottom:1.5rem;background:var(--bg2);border-radius:12px;overflow:hidden}
.tab-btn{flex:1;padding:.7rem;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:.85rem;font-weight:500;font-family:inherit;transition:all .15s}
.tab-btn:hover{color:var(--tx);background:rgba(255,255,255,.03)}
.tab-btn.on{color:var(--p);background:rgba(102,126,234,.12)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:1.75rem}
.card h2{margin-bottom:1rem;font-size:1.15rem;font-weight:700}
.card .desc{color:var(--t2);font-size:.78rem;margin-bottom:1rem}
.fg{display:flex;flex-direction:column;gap:.55rem;margin-bottom:.85rem}
.fg label{font-size:.75rem;color:var(--t2);font-weight:500}
.fg input,.fg textarea{width:100%;padding:.6rem .8rem;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.85rem;font-family:inherit;outline:none;transition:border-color .15s}
.fg input:focus,.fg textarea:focus{border-color:var(--p)}
.fg textarea{resize:vertical;min-height:60px}
.btn-p{display:block;width:100%;padding:.65rem;border:none;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:500;font-family:inherit;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;transition:all .15s}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(102,126,234,.3)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-s{padding:.5rem 1rem;border:1px solid rgba(67,233,123,.2);border-radius:7px;background:rgba(67,233,123,.1);color:var(--g);cursor:pointer;font-size:.8rem;font-weight:500;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-s:hover{background:rgba(67,233,123,.2)}
.btn-s:disabled{opacity:.5;cursor:not-allowed}
.btn-d{padding:.5rem 1rem;border:1px solid rgba(255,107,107,.25);border-radius:7px;background:rgba(255,107,107,.1);color:var(--r);cursor:pointer;font-size:.8rem;font-weight:500;font-family:inherit;transition:all .15s}
.msg{display:none;padding:.55rem .75rem;border-radius:8px;margin-bottom:.7rem;font-size:.78rem}
.msg-ok{background:rgba(67,233,123,.08);color:var(--g);border:1px solid rgba(67,233,123,.15)}
.msg-err{background:rgba(255,107,107,.08);color:var(--r);border:1px solid rgba(255,107,107,.15)}
.captcha-wrap{display:flex;align-items:center;gap:.5rem}
.captcha-svg{flex-shrink:0;width:180px;height:50px;border-radius:8px;border:1px solid var(--bd);overflow:hidden;cursor:pointer;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;min-width:180px}
.captcha-svg svg{display:block}
.captcha-wrap input{flex:1}
.code-row{display:flex;gap:.5rem}
.code-row input{flex:1}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.info-box{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:8px;padding:.6rem .8rem}
.info-box .lbl{font-size:.68rem;color:var(--t3);margin-bottom:.15rem}
.info-box .val{font-size:.85rem;font-weight:500}
.log-list{max-height:200px;overflow-y:auto;font-size:.75rem;color:var(--t2)}
.log-list li{padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.03)}
.hidden{display:none!important}
.code-block{background:rgba(255,255,255,.04);padding:.5rem;border-radius:6px;font-family:'Courier New',monospace;word-break:break-all;font-size:.8rem;margin:.25rem 0}
.backup-box{background:rgba(254,202,87,.06);border:1px solid rgba(254,202,87,.2);border-radius:8px;padding:.75rem;margin-top:.5rem}
.backup-box .title{font-size:.75rem;color:var(--y);margin-bottom:.4rem;font-weight:500}
.backup-box code{display:block;font-size:.78rem;color:var(--tx);font-family:'Courier New',monospace;padding:2px 0}
.divider{border-top:1px solid var(--bd);margin:1rem 0;padding-top:1rem}
.toast-wrap{position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem}
.toast{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:.55rem 1rem;font-size:.78rem;animation:toastIn .3s;max-width:300px}
.toast-err{border-color:rgba(255,107,107,.3);color:var(--r)}
.toast-ok{border-color:rgba(67,233,123,.3);color:var(--g)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">SkyXing</span>
  <a href="/">首页</a>
  <a href="/admin">管理</a>
  <span class="user-info" id="topUser"></span>
  <a href="#" id="logoutLink" class="hidden">退出</a>
</div>

<div class="content">

<!-- 未登录界面 -->
<div id="viewGuest">
  <div class="tabs">
    <button class="tab-btn on" data-tab="login">登录</button>
    <button class="tab-btn" data-tab="register">注册</button>
  </div>

  <div id="tab-login" class="card">
    <h2>登录</h2>
    <div id="loginMsg" class="msg"></div>
    <div class="fg"><label>用户名</label><input id="loginUser" placeholder="请输入用户名" autocomplete="username"></div>
    <div class="fg"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password"></div>
    <div class="fg"><label>人机验证</label>
      <div class="captcha-wrap"><div class="captcha-svg" id="loginCaptchaSvg" title="点击刷新验证码"><span style="color:var(--t3);font-size:.75rem">加载中...</span></div><input id="loginCaptcha" placeholder="输入算术结果"><button class="btn-s" id="loginRefreshCaptcha">刷新</button></div>
    </div>
    <div class="fg" id="login2FAWrap" style="display:none"><label>二次认证验证码</label><input id="login2FA" placeholder="6位验证码或备用码"></div>
    <button class="btn-p" id="loginBtn">登录</button>
  </div>

  <div id="tab-register" class="card hidden">
    <h2>注册</h2>
    <div id="regMsg" class="msg"></div>
    <div class="fg"><label>用户名（3-12位）</label><input id="regUser" placeholder="支持中英文、数字、下划线" autocomplete="off"></div>
    <div class="fg"><label>密码（至少6位）</label><input type="password" id="regPass" placeholder="请输入密码" autocomplete="new-password"></div>
    <div class="fg"><label>人机验证</label>
      <div class="captcha-wrap"><div class="captcha-svg" id="regCaptchaSvg" title="点击刷新验证码"><span style="color:var(--t3);font-size:.75rem">加载中...</span></div><input id="regCaptcha" placeholder="输入算术结果"><button class="btn-s" id="regRefreshCaptcha">刷新</button></div>
    </div>
    <button class="btn-p" id="regBtn">注册</button>
  </div>
</div>

<!-- 已登录界面 -->
<div id="viewAuth" class="hidden">
  <div class="tabs">
    <button class="tab-btn on" data-tab="profile">个人资料</button>
    <button class="tab-btn" data-tab="security">安全设置</button>
    <button class="tab-btn" data-tab="twofactor">二次认证</button>
  </div>

  <div id="tab-profile" class="card">
    <h2>个人资料</h2>
    <div id="profileMsg" class="msg"></div>
    <div class="fg"><label>用户名</label><input id="profUser" placeholder="用户名"></div>
    <div class="fg"><label>个人简介</label><textarea id="profBio" placeholder="介绍一下自己..."></textarea></div>
    <button class="btn-p" id="profSaveBtn">保存</button>
  </div>

  <div id="tab-security" class="card hidden">
    <h2>安全信息</h2>
    <div id="secMsg" class="msg"></div>
    <div class="info-grid" id="secInfo" style="margin-bottom:1rem"></div>

    <div class="divider">
      <h3 style="font-size:.95rem;margin-bottom:.75rem;color:var(--t2)">安全认证</h3>
      <div class="desc">修改安全设置前需要验证身份。登录后5分钟内可免验证。</div>
      <button class="btn-s" id="secVerifyBtn" style="margin:.6rem 0">开始验证</button>
      <div id="secVerifyForm" class="hidden">
        <div class="fg"><label>当前密码</label><input type="password" id="secVerifyPass" placeholder="请输入当前密码"></div>
        <div class="fg" id="secVerify2FAWrap" style="display:none"><label>二次认证验证码</label><input id="secVerify2FA" placeholder="6位验证码或备用码"></div>
        <button class="btn-p" id="secVerifySubmit">验证</button>
      </div>
      <div id="secEditForm" class="hidden" style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--bd)">
        <div class="fg"><label>新密码</label><input type="password" id="secNewPass" placeholder="留空则不修改密码"></div>
        <div class="fg"><label>新邮箱</label><input type="email" id="secNewEmail" placeholder="输入新邮箱地址（可选）"></div>
        <button class="btn-p" id="secSaveBtn">保存修改</button>
      </div>
    </div>
  </div>

  <div id="tab-twofactor" class="card hidden">
    <h2>二次认证</h2>
    <div id="twoMsg" class="msg"></div>
    <div id="twofaStatus"></div>
    <div id="twofaSetup" class="hidden">
      <div class="desc">使用身份验证器App（如 Google Authenticator、Authy）扫描QR码或手动输入密钥。</div>
      <div class="fg"><label>密钥（Base32）</label><div class="code-block" id="twofaSecret"></div></div>
      <div class="fg"><label>URI（用于生成QR码）</label><div class="code-block" style="font-size:.65rem" id="twofaUri"></div></div>
      <div class="fg"><label>验证码</label><input id="twofaCode" placeholder="输入App中的6位验证码"></div>
      <div id="backupCodesBlock" class="backup-box hidden">
        <div class="title">备用恢复码（请妥善保管）：</div>
        <div id="backupCodesList"></div>
      </div>
      <button class="btn-p" id="twofaVerifyBtn">验证并启用</button>
    </div>
  </div>
</div>

</div>

<div class="toast-wrap" id="toastContainer"></div>

<script>
(function(){ "use strict";
var STATE={token:null,user:null,safeToken:null,loginCaptchaId:null,regCaptchaId:null};

function toast(msg,err){
  var c=document.getElementById('toastContainer');
  var t=document.createElement('div');
  t.className='toast '+(err?'toast-err':'toast-ok');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(function(){t.remove()},3000);
}

function showMsg(id,msg,err){
  var el=document.getElementById(id);
  el.style.display='block';
  el.className='msg '+(err?'msg-err':'msg-ok');
  el.textContent=msg;
}

function hideMsg(id){
  document.getElementById(id).style.display='none';
}

function getToken(){ return localStorage.getItem('auth_token'); }
function setToken(t){
  STATE.token=t;
  localStorage.setItem('auth_token',t);
  try{document.cookie='auth_token='+t+';path=/;max-age=604800;SameSite=Strict'}catch(e){}
}
function removeToken(){
  STATE.token=null;STATE.user=null;STATE.safeToken=null;
  localStorage.removeItem('auth_token');
  try{document.cookie='auth_token=;path=/;max-age=0'}catch(e){}
}

function switchTab(name){
  ['login','register','profile','security','twofactor'].forEach(function(t){
    document.getElementById('tab-'+t).classList.add('hidden');
  });
  var tab=document.getElementById('tab-'+name);
  if(tab) tab.classList.remove('hidden');
  document.querySelectorAll('.tab-btn.on').forEach(function(b){b.classList.remove('on')});
  var btns=document.querySelectorAll('.tab-btn[data-tab="'+name+'"]');
  btns.forEach(function(b){b.classList.add('on')});
}

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    switchTab(this.getAttribute('data-tab'));
  });
});

async function api(path,options){
  options=options||{};
  var headers=options.headers||{};
  var token=getToken();
  if(token) headers['Authorization']='Bearer '+token;
  if(!headers['Content-Type']&&!(options.body instanceof FormData)) headers['Content-Type']='application/json';
  options.headers=headers;
  var r=await fetch(path,options);
  if(r.status===401){removeToken();showGuest();throw new Error('AUTH_FAILED')}
  var d=await r.json();
  if(!d.success&&r.status>=400) throw new Error(d.message||'请求失败');
  return d;
}

function showGuest(){
  document.getElementById('viewGuest').classList.remove('hidden');
  document.getElementById('viewAuth').classList.add('hidden');
  document.getElementById('topUser').textContent='';
  document.getElementById('logoutLink').classList.add('hidden');
  switchTab('login');
  loadCaptcha('login');
}

function showAuth(user){
  STATE.user=user;
  document.getElementById('viewGuest').classList.add('hidden');
  document.getElementById('viewAuth').classList.remove('hidden');
  document.getElementById('topUser').textContent=user.username;
  document.getElementById('logoutLink').classList.remove('hidden');
  switchTab('profile');
  loadProfile();
  loadSecurity();
  load2FAStatus();
}

// 验证码 - 直接渲染 SVG 到容器中（后端返回纯 SVG 文本）
function renderCaptchaSVG(containerId, svgText) {
  var container = document.getElementById(containerId);
  if (!container) return;
  try {
    container.innerHTML = svgText;
  } catch(e) {
    container.innerHTML = '<span style="color:var(--r);font-size:.7rem">渲染失败</span>';
  }
}

async function loadCaptcha(prefix){
  var container = document.getElementById(prefix + 'CaptchaSvg');
  if (container) container.innerHTML = '<span style="color:var(--t3);font-size:.75rem">加载中...</span>';
  try{
    var d = await api('/api/captcha/generate');
    if(d.success && d.captchaSvg){
      renderCaptchaSVG(prefix + 'CaptchaSvg', d.captchaSvg);
      STATE[prefix+'CaptchaId'] = d.captchaId;
    }
  }catch(e){
    console.error('验证码加载失败:', e.message);
    if (container) container.innerHTML = '<span style="color:var(--r);font-size:.7rem">加载失败，点击刷新</span>';
  }
}

// 点击验证码图片刷新
document.getElementById('loginCaptchaSvg').addEventListener('click', function(){ loadCaptcha('login'); });
document.getElementById('regCaptchaSvg').addEventListener('click', function(){ loadCaptcha('reg'); });
document.getElementById('loginRefreshCaptcha').addEventListener('click',function(){loadCaptcha('login')});
document.getElementById('regRefreshCaptcha').addEventListener('click',function(){loadCaptcha('reg')});

// 登录
document.getElementById('loginBtn').addEventListener('click',async function(){
  var u=document.getElementById('loginUser').value;
  var p=document.getElementById('loginPass').value;
  var cap=document.getElementById('loginCaptcha').value;
  var fa=document.getElementById('login2FA').value;
  if(!u||!p){showMsg('loginMsg','请填写所有字段',true);return}
  if(!cap){showMsg('loginMsg','请完成人机验证',true);return}
  var btn=this;btn.disabled=true;btn.textContent='登录中...';hideMsg('loginMsg');
  try{
    var d=await api('/api/user/login',{method:'POST',
      body:JSON.stringify({username:u,password:p,captchaId:STATE.loginCaptchaId,captchaAnswer:cap,twoFactorCode:fa||undefined})});
    if(d.success){
      setToken(d.token);
      showAuth(d.user);
      toast('登录成功');
      if(d.redirect&&d.redirect!=='/') window.location.href=d.redirect;
    }else if(d.need2FA){
      document.getElementById('login2FAWrap').style.display='';
      showMsg('loginMsg','需要二次认证验证码',true);
      loadCaptcha('login');
    }else{
      showMsg('loginMsg',d.message||'登录失败',true);
      loadCaptcha('login');
    }
  }catch(e){if(e.message!=='AUTH_FAILED')showMsg('loginMsg',e.message,true);loadCaptcha('login')}
  btn.disabled=false;btn.textContent='登录';
});

// 注册
document.getElementById('regBtn').addEventListener('click',async function(){
  var u=document.getElementById('regUser').value;
  var p=document.getElementById('regPass').value;
  var cap=document.getElementById('regCaptcha').value;
  if(!u||!p){showMsg('regMsg','请填写所有字段',true);return}
  if(!cap){showMsg('regMsg','请完成人机验证',true);return}
  var btn=this;btn.disabled=true;btn.textContent='注册中...';hideMsg('regMsg');
  try{
    var d=await api('/api/user/register',{method:'POST',
      body:JSON.stringify({username:u,password:p,captchaId:STATE.regCaptchaId,captchaAnswer:cap})});
    if(d.success){
      setToken(d.token);
      showAuth(d.user);
      toast('注册成功');
    }else{showMsg('regMsg',d.message||'注册失败',true);loadCaptcha('reg')}
  }catch(e){if(e.message!=='AUTH_FAILED')showMsg('regMsg',e.message,true);loadCaptcha('reg')}
  btn.disabled=false;btn.textContent='注册';
});

// 个人资料
async function loadProfile(){
  try{
    var d=await api('/api/user/me');
    if(d.success&&d.user){
      document.getElementById('profUser').value=d.user.username||'';
      document.getElementById('profBio').value=d.user.bio||'';
    }
  }catch(e){if(e.message!=='AUTH_FAILED')console.error(e)}
}

document.getElementById('profSaveBtn').addEventListener('click',async function(){
  var un=document.getElementById('profUser').value;
  var bio=document.getElementById('profBio').value;
  var btn=this;btn.disabled=true;hideMsg('profileMsg');
  try{
    var d=await api('/api/user/update',{method:'POST',body:JSON.stringify({username:un,bio:bio})});
    showMsg('profileMsg',d.message||'已保存');
    if(d.user){STATE.user=d.user;document.getElementById('topUser').textContent=d.user.username}
  }catch(e){showMsg('profileMsg',e.message,true)}
  btn.disabled=false;
});

// 安全设置
async function loadSecurity(){
  try{
    var d=await api('/api/user/security');
    if(d.success&&d.security){
      var s=d.security;
      var html='';
      html+='<div class="info-box"><div class="lbl">邮箱</div><div class="val">'+(s.email||'未设置')+'</div></div>';
      html+='<div class="info-box"><div class="lbl">二次认证</div><div class="val" style="color:'+(s.twoFactorEnabled?'var(--g)':'var(--t2)')+'">'+(s.twoFactorEnabled?'已启用':'未启用')+'</div></div>';
      html+='<div class="info-box"><div class="lbl">上次登录</div><div class="val">'+new Date(s.lastLogin).toLocaleString()+'</div></div>';
      html+='<div class="info-box"><div class="lbl">注册时间</div><div class="val">'+new Date(s.createdAt).toLocaleDateString()+'</div></div>';
      document.getElementById('secInfo').innerHTML=html;

      if(s.securityLog&&s.securityLog.length){
        var log='<h3 style="font-size:.85rem;margin:1rem 0 .5rem;color:var(--t2)">近期活动</h3><ul class="log-list">';
        s.securityLog.forEach(function(l){
          var act=l.action==='change_password'?'修改密码':
            l.action==='change_email'?'修改邮箱':
            l.action==='enable_2fa'?'启用二次认证':
            l.action==='disable_2fa'?'关闭二次认证':l.action;
          log+='<li>'+new Date(l.time).toLocaleString()+' - '+act+'</li>';
        });
        log+='</ul>';
        document.getElementById('secInfo').innerHTML+=log;
      }
    }
  }catch(e){if(e.message!=='AUTH_FAILED')console.error(e)}
}

document.getElementById('secVerifyBtn').addEventListener('click',function(){
  document.getElementById('secVerifyForm').classList.remove('hidden');
  if(STATE.user&&STATE.user.twoFactorEnabled){
    document.getElementById('secVerify2FAWrap').style.display='';
  }else{
    document.getElementById('secVerify2FAWrap').style.display='none';
  }
});

document.getElementById('secVerifySubmit').addEventListener('click',async function(){
  var pw=document.getElementById('secVerifyPass').value;
  var fa=document.getElementById('secVerify2FA').value;
  if(!pw){toast('请输入密码',true);return}
  var btn=this;btn.disabled=true;hideMsg('secMsg');
  try{
    var d=await api('/api/user/security-verify',{method:'POST',
      body:JSON.stringify({password:pw,twoFactorCode:fa||undefined})});
    if(d.success){
      STATE.safeToken=d.safeToken;
      document.getElementById('secVerifyForm').classList.add('hidden');
      document.getElementById('secEditForm').classList.remove('hidden');
      toast('验证通过');
    }else{showMsg('secMsg',d.message,true)}
  }catch(e){showMsg('secMsg',e.message,true)}
  btn.disabled=false;
});

document.getElementById('secSaveBtn').addEventListener('click',async function(){
  var np=document.getElementById('secNewPass').value;
  var ne=document.getElementById('secNewEmail').value;
  var btn=this;btn.disabled=true;hideMsg('secMsg');
  try{
    if(np){
      var d=await api('/api/user/changepassword',{method:'POST',body:JSON.stringify({newPassword:np,safeToken:STATE.safeToken})});
      if(!d.success){showMsg('secMsg',d.message,true);btn.disabled=false;return}
      toast('密码已修改');
    }
    if(ne){
      var d2=await api('/api/user/changeemail',{method:'POST',body:JSON.stringify({newEmail:ne,safeToken:STATE.safeToken})});
      if(!d2.success){showMsg('secMsg',d2.message,true);btn.disabled=false;return}
      toast('邮箱已修改');
    }
    if(!np&&!ne){toast('没有需要修改的内容',true);btn.disabled=false;return}
    STATE.safeToken=null;
    document.getElementById('secEditForm').classList.add('hidden');
    document.getElementById('secNewPass').value='';
    document.getElementById('secNewEmail').value='';
    loadSecurity();
    showMsg('secMsg','安全信息已更新');
  }catch(e){showMsg('secMsg',e.message,true)}
  btn.disabled=false;
});

// 二次认证
async function load2FAStatus(){
  try{
    var d=await api('/api/user/me');
    if(d.success){
      var s='';
      if(d.has2FA){
        s='<div style="background:rgba(67,233,123,.08);border:1px solid rgba(67,233,123,.15);padding:.75rem;border-radius:8px;margin-bottom:.75rem"><span style="color:var(--g);font-weight:600">[已启用] 二次认证已启用</span></div>';
        s+='<button class="btn-d" id="twofaDisableBtn">关闭二次认证</button>';
        document.getElementById('twofaSetup').classList.add('hidden');
      }else{
        s='<div style="background:rgba(255,255,255,.03);border:1px solid var(--bd);padding:.75rem;border-radius:8px;margin-bottom:.75rem"><span style="color:var(--t2)">二次认证未启用</span></div>';
        s+='<button class="btn-s" id="twofaEnableBtn">设置二次认证</button>';
        document.getElementById('twofaSetup').classList.add('hidden');
      }
      document.getElementById('twofaStatus').innerHTML=s;
      if(d.has2FA) document.getElementById('twofaDisableBtn').addEventListener('click',disable2FA);
      else document.getElementById('twofaEnableBtn').addEventListener('click',setup2FA);
    }
  }catch(e){if(e.message!=='AUTH_FAILED')console.error(e)}
}

async function setup2FA(){
  try{
    var d=await api('/api/user/2fa/setup',{method:'POST'});
    if(d.success){
      document.getElementById('twofaSecret').textContent=d.secret;
      document.getElementById('twofaUri').textContent=d.uri;
      document.getElementById('twofaSetup').classList.remove('hidden');
      if(d.backupCodes){
        document.getElementById('backupCodesBlock').classList.remove('hidden');
        document.getElementById('backupCodesList').innerHTML=d.backupCodes.map(function(c){return'<code>'+c+'</code>'}).join('');
      }
    }else{toast(d.message,true)}
  }catch(e){toast(e.message,true)}
}

document.getElementById('twofaVerifyBtn').addEventListener('click',async function(){
  var code=document.getElementById('twofaCode').value;
  if(!code){toast('请输入验证码',true);return}
  var btn=this;btn.disabled=true;
  try{
    var d=await api('/api/user/2fa/verify',{method:'POST',body:JSON.stringify({code:code})});
    if(d.success){
      toast('二次认证已启用！请妥善保管备用码。');
      document.getElementById('twofaSetup').classList.add('hidden');
      load2FAStatus();
    }else{toast(d.message,true)}
  }catch(e){toast(e.message,true)}
  btn.disabled=false;
});

async function disable2FA(){
  if(!confirm('确定关闭二次认证？这将降低账户安全性。'))return;
  try{
    var d=await api('/api/user/2fa/toggle',{method:'POST',body:JSON.stringify({enable:false})});
    if(d.success){toast('二次认证已关闭');load2FAStatus()}
    else toast(d.message||'操作失败',true)
  }catch(e){toast(e.message,true)}
}

// 退出
document.getElementById('logoutLink').addEventListener('click',function(e){
  e.preventDefault();
  api('/api/user/logout',{method:'POST'}).finally(function(){removeToken();showGuest()});
});

// 初始化
async function init(){
  var t=getToken();
  if(t){
    try{
      var d=await api('/api/user/me');
      if(d.success&&d.user) showAuth(d.user);
    }catch(e){removeToken();showGuest()}
  }else{showGuest()}
}
init();
})();
</script>
