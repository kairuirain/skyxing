<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyXing - 个人网站</title>
<link rel="stylesheet" href="/styles/global.css">
<style>
.hero{text-align:center;padding:4rem 0 2rem}
.hero h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--p),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.hero p{color:var(--t2);font-size:1.1rem;margin-bottom:2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;margin-top:2rem}
.user-bar{display:flex;align-items:center;gap:.75rem}
.user-bar .username{color:var(--p);font-weight:600;font-size:.85rem}
.user-bar .btn-sm{padding:.35rem .7rem;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:.75rem;font-family:inherit;transition:.15s;text-decoration:none}
.user-bar .btn-sm:hover{color:var(--tx);border-color:var(--p)}
#featureBtns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
#featureBtns a.btn{border-radius:10px;padding:.75rem 1.75rem;font-size:.9rem;font-weight:600}
</style>
</head>
<body>
<header class="header"><div class="container header-inner">
<a href="/" class="logo">SkyXing</a>
<nav>
  <a href="/">首页</a>
  <a href="/blog">博客</a>
  <a href="/admin">管理后台</a>
</nav>
<div class="user-bar" id="userBar">
  <span class="username" id="headerUser"></span>
  <a href="/user" class="btn-sm" id="btnLogin">登录</a>
  <a href="#" class="btn-sm" id="btnLogout" style="display:none">退出</a>
</div>
</div></header>

<main class="container">
<div class="hero">
<h1>SkyXing</h1>
<p>个人博客 | 文件分享 | 更多功能</p>
<div id="featureBtns">
  <a href="/blog" class="btn btn-p" id="btnBlog">进入博客</a>
  <a href="/admin" class="btn" id="btnAdmin" style="background:transparent;color:var(--tx);border:1px solid var(--bd)">管理后台</a>
</div>
</div>
</main>

<footer class="footer">Copyright &copy; 2026 SkyXing. 保留所有权利。</footer>

<script>
(function(){
var token = localStorage.getItem('auth_token');

function getToken(){ return localStorage.getItem('auth_token'); }

async function api(path, options){
  options = options || {};
  var headers = options.headers || {};
  var t = getToken();
  if (t) headers['Authorization'] = 'Bearer ' + t;
  if (!headers['Content-Type'] && !(options.body instanceof FormData))
    headers['Content-Type'] = 'application/json';
  options.headers = headers;
  var r = await fetch(path, options);
  if (r.status === 401) return null;
  var d = await r.json();
  return d;
}

function updateUI(user){
  var headerUser = document.getElementById('headerUser');
  var btnLogin = document.getElementById('btnLogin');
  var btnLogout = document.getElementById('btnLogout');
  var btnBlog = document.getElementById('btnBlog');
  var btnAdmin = document.getElementById('btnAdmin');

  if (user) {
    headerUser.textContent = user.username;
    btnLogin.style.display = 'none';
    btnLogout.style.display = '';

    // 角色动态渲染：管理员隐藏常规功能按钮（管理功能入口另行处理）
    if (user.role === 'admin' || user.role === 'feature_admin') {
      btnBlog.style.display = 'none';
    } else {
      btnBlog.style.display = '';
    }
  } else {
    headerUser.textContent = '';
    btnLogin.style.display = '';
    btnLogout.style.display = 'none';
    btnBlog.style.display = '';
  }
}

document.getElementById('btnLogout').addEventListener('click', function(e){
  e.preventDefault();
  var t = getToken();
  fetch('/api/user/logout', {
    method: 'POST',
    headers: t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : {}
  }).finally(function(){
    localStorage.removeItem('auth_token');
    document.cookie = 'auth_token=;path=/;max-age=0';
    updateUI(null);
  });
});

// 初始化
async function init(){
  if (!token) { updateUI(null); return; }
  try {
    var d = await api('/api/user/me');
    if (d && d.success && d.user) {
      updateUI(d.user);
    } else {
      updateUI(null);
    }
  } catch(e) { updateUI(null); }
}
init();
})();
</script>
</body>
</html>
